<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Country Stance Map</title>

<style>
  html, body { height: 100%; margin: 0; }
  #map { height: 100%; width: 100%; }
</style>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body>

<div id="map"></div>

<script>
// LIVE CSV
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTW9bj91CB10n8fciv4NykoBf0JYDvBIrnYWas7I125uc-hltvtjNloatvpAsBCY1G7uD0VImPrfUzJ/pub?output=csv";

// Correct colors
const stanceColors = {
  supportive: "#2ECC71",
  neutral: "#F1C40F",
  "neutral-bad": "#E67E22",
  opposed: "#E74C3C"
};

// Fully correct RFC4180 CSV parser
function parseCSV(text) {
  const rows = [];
  let cur = "";
  let row = [];
  let inside = false;

  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    const nc = text[i+1];

    if (c === '"' && inside && nc === '"') {
      cur += '"';
      i++;
    } else if (c === '"') {
      inside = !inside;
    } else if (c === ',' && !inside) {
      row.push(cur);
      cur = "";
    } else if ((c === '\n' || c === '\r') && !inside) {
      if (cur || row.length) {
        row.push(cur);
        rows.push(row);
      }
      row = [];
      cur = "";
    } else {
      cur += c;
    }
  }

  if (cur || row.length) {
    row.push(cur);
    rows.push(row);
  }

  return rows;
}

async function loadCSV() {
  const res = await fetch(CSV_URL);
  const text = await res.text();
  const parsed = parseCSV(text);

  const headers = parsed[0].map(h => h.toLowerCase().trim());
  const rows = parsed.slice(1).map(cols => {
    const obj = {};
    headers.forEach((h,i) => obj[h] = cols[i] || "");
    return obj;
  });

  return rows.filter(r => r.country && r.stance);
}

async function init() {
  const map = L.map("map").setView([20, 0], 2);
  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

  const data = await loadCSV();

  const geo = await fetch("https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson").then(r=>r.json());

  const rows = {};
  data.forEach(r => {
    rows[r.country.toLowerCase()] = r;
  });

  function style(f) {
    const name = f.properties.ADMIN.toLowerCase();
    const row = rows[name];
    if (!row) return { color:"#555", fillColor:"#ccc", fillOpacity:0.4 };
    const stance = row.stance.toLowerCase();
    return { color:"#333", fillColor: stanceColors[stance] || "#ccc", fillOpacity:0.8 };
  }

  function each(f,layer){
    const name = f.properties.ADMIN;
    const row = rows[name.toLowerCase()];
    const notes = row ? row.notes : "No data";
    layer.bindTooltip(name + "\n" + notes);
  }

  L.geoJson(geo, { style, onEachFeature: each }).addTo(map);
}

init();
</script>

</body>
</html>
