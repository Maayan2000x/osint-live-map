<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Country Stance Map</title>

  <style>
    html, body { height: 100%; margin: 0; }
    #map { width: 100%; height: 100%; }
    .leaflet-tooltip { font-size: 14px; white-space: pre-line; }
  </style>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="https://www.gstatic.com/charts/loader.js"></script>
</head>

<body>
<div id="map"></div>

<script>
// LIVE Google Sheet URL (Visualization API)
const sheetID = "1qx66Rk8WavEiY-7hUn8xZW0z8oU-A2CaMCl_jtQHCSU";
const gid = "572594260";
const sheetQueryUrl =
  "https://docs.google.com/spreadsheets/d/" +
  sheetID +
  "/gviz/tq?gid=" +
  gid +
  "&tqx=out:json";

const stanceColors = {
  supportive: "#2ECC71",
  neutral: "#F1C40F",
  "neutral-bad": "#E67E22",
  opposed: "#E74C3C"
};

google.charts.load("current", { packages: ["table"] });

function loadSheetData() {
  return fetch(sheetQueryUrl)
    .then(r => r.text())
    .then(text => {
      const json = JSON.parse(text.substring(47, text.length - 2));
      const table = json.table;

      const headers = table.cols.map(c => (c.label || "").toLowerCase());
      const rows = table.rows.map(r =>
        r.c.map(cell => (cell && cell.v ? String(cell.v).trim() : ""))
      );

      const data = rows.map(row => {
        const obj = {};
        headers.forEach((h, i) => obj[h] = row[i] || "");
        return obj;
      });

      return data.filter(r =>
        r.country !== "" &&
        r.stance !== ""
      );
    });
}

async function loadMap() {
  const map = L.map("map").setView([20, 0], 2);
  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 6 }).addTo(map);

  const data = await loadSheetData();

  const stanceMap = {};
  data.forEach(r => {
    const key = r.country.toLowerCase();
    stanceMap[key] = {
      stance: r.stance.toLowerCase(),
      notes: r.notes || ""
    };
  });

  const geo = await fetch(
    "https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson"
  ).then(r => r.json());

  function style(feature) {
    const name = (feature.properties.ADMIN || "").toLowerCase();
    const entry = stanceMap[name];
    let color = "#cccccc";
    if (entry && stanceColors[entry.stance]) color = stanceColors[entry.stance];
    return { weight: 1, color: "#333", fillColor: color, fillOpacity: 0.75 };
  }

  function onEachFeature(feature, layer) {
