<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Country Stance Map</title>

<style>
  html, body { height: 100%; margin: 0; }
  #map { height: 100%; width: 100%; }
  #log { position:absolute; top:0; left:0; background:white; z-index:9999; max-height:200px; overflow:auto; font-size:12px; border:1px solid black; padding:5px; }
</style>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body>

<div id="log">Loading…</div>
<div id="map"></div>

<script>
// LOG WINDOW
function log(msg) {
  document.getElementById("log").innerHTML += msg + "<br>";
  console.log(msg);
}

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTW9bj91CB10n8fciv4NykoBf0JYDvBIrnYWas7I125uc-hltvtjNloatvpAsBCY1G7uD0VImPrfUzJ/pub?output=csv";

// stance colors
const stanceColors = {
  supportive: "#2ECC71",
  neutral: "#F1C40F",
  "neutral-bad": "#E67E22",
  opposed: "#E74C3C"
};

// Correct CSV parser
function parseCSV(text) {
  const rows = [];
  let cur = "";
  let row = [];
  let inside = false;

  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    const nc = text[i+1];

    if (c === '"' && inside && nc === '"') {
      cur += '"';
      i++;
    } else if (c === '"') {
      inside = !inside;
    } else if (c === ',' && !inside) {
      row.push(cur);
      cur = "";
    } else if ((c === '\n' || c === '\r') && !inside) {
      if (cur || row.length) {
        row.push(cur);
        rows.push(row);
      }
      row = [];
      cur = "";
    } else {
      cur += c;
    }
  }

  if (cur || row.length) {
    row.push(cur);
    rows.push(row);
  }

  return rows;
}

async function loadCSV() {
  log("Fetching CSV…");
  const res = await fetch(CSV_URL);
  const text = await res.text();
  log("CSV fetched.");

  const parsed = parseCSV(text);
  const headers = parsed[0].map(h => h.toLowerCase().trim());

  const rows = parsed.slice(1).map(cols => {
    const o = {};
    headers.forEach((h, i) => o[h] = cols[i] || "");
    return o;
  });

  log("Parsed " + rows.length + " rows.");
  rows.forEach(r => log("ROW: " + JSON.stringify(r)));

  return rows.filter(r => r.country && r.stance);
}

async function main() {
  const map = L.map("map").setView([20, 0], 2);
  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

  const rows = await loadCSV();
  const geo = await fetch("https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson").then(r => r.json());

  log("Loaded GeoJSON with " + geo.features.length + " countries.");

  const dataMap = {};
  rows.forEach(r => {
    dataMap[r.country.toLowerCase()] = r;
    log("Data key added: " + r.country.toLowerCase());
  });

  function style(feature) {
    let name = feature.properties.ADMIN;

    // FIX: handle missing or empty names
    if (!name || name.trim() === "") {
      log("Unnamed feature - applying fallback style");
      return { color:"#333", fillColor:"#ddd", fillOpacity:0.2 };
    }

    const key = name.toLowerCase();
    const row = dataMap[key];

    if (!row) {
      log("NO MATCH for " + name);
      return { color:"#555", fillColor:"#ccc", fillOpacity:0.4 };
    }

    const stance = row.stance.toLowerCase();
    const color = stanceColors[stance] || "#999";
    log("MATCH: " + name + " → " + stance + " → " + color);

    return { color:"#333", fillColor:color, fillOpacity:0.8 };
  }

  function each(feature, layer) {
    const name = feature.properties.ADMIN || "(Unnamed)";
    const key = name.toLowerCase();
    const row = dataMap[key];
    const notes = row ? row.notes : "No data";
    layer.bindTooltip(name + "\n" + notes);
  }

  L.geoJson(geo, { style, onEachFeature: each }).addTo(map);

  log("Map render complete.");
}

main();
</script>

</body>
</html>
