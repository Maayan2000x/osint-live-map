<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Country Stance Map</title>

    <style>
      html, body { height:100%; margin:0; }
      #regions_div { width:100%; height:100%; }
    </style>

    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>

    <script type="text/javascript">
      google.charts.load('current', {
        'packages':['geochart'],
      });

      google.charts.setOnLoadCallback(drawRegionsMap);

      function drawRegionsMap() {

        // LIVE SHEET URL
        const query = new google.visualization.Query(
          'https://docs.google.com/spreadsheets/d/1qx66Rk8WavEiY-7hUn8xZW0z8oU-A2CaMCl_jtQHCSU/gviz/tq?gid=572594260'
        );

        query.send(handleData);
      }

      function handleData(response) {
        if (response.isError()) {
          console.error('Error:', response.getMessage());
          return;
        }

        const data = response.getDataTable();

        // stance → color
        const colors = {
          'supportive': '#2ECC71',
          'neutral': '#F1C40F',
          'neutral-bad': '#E67E22',
          'opposed': '#E74C3C'
        };

        // create a DataView that adds a color column
        const view = new google.visualization.DataView(data);
        view.setColumns([
          0, // country
          {
            type: 'string',
            label: 'Color',
            calc: function (dt, row) {
              const stance = dt.getValue(row, 1).toLowerCase();
              return colors[stance] || '#cccccc';
            }
          },
          2 // notes
        ]);

        const options = {
          colorAxis: {colors:['#cccccc','#cccccc']},
          legend: 'none',
          tooltip: { isHtml: true }
        };

        const chart = new google.visualization.GeoChart(document.getElementById('regions_div'));
        chart.draw(view, options);
      }
    </script>

  </head>

  <body>
    <div id="regions_div"></div>
  </body>
</html>
